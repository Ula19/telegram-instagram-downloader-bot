services:
  # Наш бот
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      bot-api:
        condition: service_started
      cobalt:
        condition: service_started
    volumes:
      # доступ к файлам Local Bot API для фоновой очистки
      - bot-api-data:/var/lib/telegram-bot-api

  # Local Bot API — файлы до 2 ГБ без ограничений
  bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${API_ID}
      TELEGRAM_API_HASH: ${API_HASH}
      TELEGRAM_LOCAL: 1
    ports:
      - "8101:8081"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-bot_4_insta}
      POSTGRES_USER: ${DB_USER:-bot_4_insta}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1234}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bot_4_insta} -d ${DB_NAME:-bot_4_insta}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Cobalt API — скачивание медиа из Instagram
  cobalt:
    image: ghcr.io/imputnet/cobalt:10
    restart: unless-stopped
    environment:
      API_URL: "http://cobalt:9000"

volumes:
  postgres-data:
  bot-api-data:
